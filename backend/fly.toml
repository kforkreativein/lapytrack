# fly.toml — LapyTrack backend
# Region: sin = Singapore (lowest latency from India)
app = "lapytrack-api"
primary_region = "sin"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "lapytrack_uploads"
  destination = "/app/uploads"

[checks]
  [checks.alive]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/api/"
    port = 8080
    timeout = "5s"
    type = "http"
